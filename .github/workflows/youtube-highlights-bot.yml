name: YouTube Highlights Bot - Smart Forever (Every 6 Hours)

on:
  # ✅ SMART FOREVER: Every 6 hours (4 times per day)
  # This keeps the bot sustainable forever while building a massive library
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Runs at 12am, 6am, 12pm, 6pm UTC
  workflow_dispatch:

jobs:
  fetch-highlights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install firebase-admin
      
      # Run the Smart Forever bot
      - run: node scripts/youtube-highlights-bot.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
