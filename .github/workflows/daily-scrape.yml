name: Daily NPFL Scrape
on:
  schedule:
    # This is the "Timer". 0 * * * * means "Every hour at minute 0"
    - cron: '0 * * * *' 
  workflow_dispatch: # This adds a "Play" button so you can run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install axios cheerio firebase-admin

      - name: Run Scraper
        run: node scraper.js
        env:
          # This connects to the Secret Key you save in Settings
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
